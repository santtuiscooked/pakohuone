<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pakohuone</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffe44d;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      position: relative;
    }

    #dvdImage {
      position: fixed;
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      left: 20px;
      top: 20px;
    }

    .background-chaos {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background:
        radial-gradient(circle at 10% 20%, #ff4fd8 0 40px, transparent 41px),
        radial-gradient(circle at 90% 15%, #00d9ff 0 55px, transparent 56px),
        radial-gradient(circle at 25% 85%, #7dff7d 0 70px, transparent 71px),
        radial-gradient(circle at 80% 80%, #ff7a00 0 48px, transparent 49px),
        radial-gradient(circle at 55% 40%, #9b5cff 0 65px, transparent 66px);
      animation: floatBg 8s infinite alternate ease-in-out;
      z-index: 0;
    }

    @keyframes floatBg {
      from { transform: scale(1) rotate(0deg); }
      to { transform: scale(1.08) rotate(2deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 760px);
      background: rgba(255, 255, 255, 0.88);
      border: 5px solid #111;
      border-radius: 28px;
      box-shadow: 12px 12px 0 #111;
      padding: 34px 26px 30px;
      text-align: center;
    }

    .title {
      margin: 0 0 24px;
      font-size: clamp(2.3rem, 7vw, 5rem);
      line-height: 0.95;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ff0080, #ff6a00, #ffee00, #1cff00, #00d9ff, #7b2cff, #ff0080);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: rainbowShift 1.2s linear infinite, bounce 1s infinite ease-in-out;
    }

    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-6px) rotate(1deg); }
    }

    .subtitle {
      font-size: clamp(1rem, 2.6vw, 1.35rem);
      margin: 0;
      color: #222;
      font-weight: 700;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .name-input {
      width: min(100%, 360px);
      padding: 15px 18px;
      border-radius: 16px;
      border: 3px solid #111;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      background: #fff;
    }

    .name-input:focus {
      transform: scale(1.02);
    }

    .btn-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 3px solid #111;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 5px 5px 0 #111;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 2px 2px 0 #111;
    }

    .primary-btn {
      background: #00e676;
      color: #111;
    }

    .secondary-btn {
      background: #ff87b7;
      color: #111;
    }

    .hidden {
      display: none;
    }

    .stage-text {
      margin-top: 0;
      font-size: clamp(1.15rem, 2.8vw, 1.7rem);
      font-weight: 800;
      color: #111;
    }

    .red-text {
      margin-top: 16px;
      color: #d60000;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 900;
      min-height: 2.6em;
    }

    .plain-text {
      margin-top: 22px;
      font-size: clamp(1.1rem, 2.8vw, 1.45rem);
      font-weight: 900;
      color: #111;
    }

    .section-block {
      margin-top: 26px;
    }

    @media (max-width: 540px) {
      .card {
        padding: 24px 16px 22px;
        border-radius: 22px;
      }

      button {
        width: 100%;
      }

      .btn-row {
        flex-direction: column;
      }

      #dvdImage {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>
  <img id="dvdImage" src="profiili.jpg" alt="profiili" />
  <div class="background-chaos"></div>

  <main class="card">
    <h1 class="title">TERVETULOA</h1>

    <section id="nameSection" class="row">
      <label for="playerName" class="subtitle">Mikä nimi??</label>
      <input
        id="playerName"
        class="name-input"
        type="text"
        placeholder="Kirjoita nimesi tähän"
        maxlength="30"
        autocomplete="off"
      />
      <button class="primary-btn" id="saveNameBtn">aloita</button>
    </section>

    <section id="continueSection" class="hidden">
      <div id="stageText" class="stage-text"></div>

      <div class="btn-row">
        <button class="primary-btn" id="continueBtn">Jatka</button>
        <button class="secondary-btn hidden" id="noBtn">En</button>
      </div>

      <div id="redText" class="red-text"></div>
      <div id="resultText" class="plain-text hidden"></div>

      <!-- Tehtävä 3 -->
      <div id="iqSection" class="section-block hidden">
        <div class="stage-text">Mikä on älykkyysosamääräsi?</div>
        <input
          id="iqInput"
          class="name-input"
          type="number"
          placeholder="Kirjoita luku tähän"
          autocomplete="off"
        />
        <div class="btn-row">
          <button class="primary-btn" id="iqSubmitBtn">Vastaa</button>
        </div>
      </div>

      <!-- Virheruutu -->
      <div id="iqErrorSection" class="section-block hidden">
        <div class="stage-text">
          laajan tekoälyskannauksen perusteella tämä ei ole valitettavasti mahdollista.
        </div>
        <div class="btn-row">
          <button class="secondary-btn" id="retryIqBtn">yritä uudestaan</button>
        </div>
      </div>

      <!-- Haaste 4 placeholder -->
      <div id="challenge4Section" class="section-block hidden">
        <div class="plain-text">Onnittelut, nyt taisi osua kohdalleen! Jatketaan!</div>
      </div>
    </section>
  </main>

  <script>
    const dvdImage = document.getElementById('dvdImage');
    let dvdX = 20;
    let dvdY = 20;
    let dvdDx = 2.6;
    let dvdDy = 2.2;

    function animateDvdImage() {
      const imageWidth = dvdImage.offsetWidth || 120;
      const imageHeight = dvdImage.offsetHeight || 120;
      const maxX = window.innerWidth - imageWidth;
      const maxY = window.innerHeight - imageHeight;

      dvdX += dvdDx;
      dvdY += dvdDy;

      if (dvdX <= 0) {
        dvdX = 0;
        dvdDx *= -1;
      } else if (dvdX >= maxX) {
        dvdX = maxX;
        dvdDx *= -1;
      }

      if (dvdY <= 0) {
        dvdY = 0;
        dvdDy *= -1;
      } else if (dvdY >= maxY) {
        dvdY = maxY;
        dvdDy *= -1;
      }

      dvdImage.style.left = `${dvdX}px`;
      dvdImage.style.top = `${dvdY}px`;

      requestAnimationFrame(animateDvdImage);
    }

    if (dvdImage.complete) {
      animateDvdImage();
    } else {
      dvdImage.addEventListener('load', animateDvdImage, { once: true });
    }

    const playerNameInput = document.getElementById('playerName');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const nameSection = document.getElementById('nameSection');
    const continueSection = document.getElementById('continueSection');
    const stageText = document.getElementById('stageText');
    const continueBtn = document.getElementById('continueBtn');
    const noBtn = document.getElementById('noBtn');
    const redText = document.getElementById('redText');
    const resultText = document.getElementById('resultText');

    const iqSection = document.getElementById('iqSection');
    const iqInput = document.getElementById('iqInput');
    const iqSubmitBtn = document.getElementById('iqSubmitBtn');
    const iqErrorSection = document.getElementById('iqErrorSection');
    const retryIqBtn = document.getElementById('retryIqBtn');
    const challenge4Section = document.getElementById('challenge4Section');

    let continueClicks = 0;

    function resetTask3Views() {
      iqSection.classList.add('hidden');
      iqErrorSection.classList.add('hidden');
      challenge4Section.classList.add('hidden');
    }

    function showContinueFlow(name) {
      continueClicks = 0;
      nameSection.classList.add('hidden');
      continueSection.classList.remove('hidden');
      stageText.style.display = 'block';
      stageText.textContent = `Tervetuloa ${name}! Jatketaanko?`;
      redText.textContent = '';
      resultText.textContent = '';
      resultText.classList.add('hidden');
      continueBtn.classList.remove('hidden');
      noBtn.classList.add('hidden');
      resetTask3Views();
      iqInput.value = '';
    }

    function showIqQuestion() {
      iqErrorSection.classList.add('hidden');
      challenge4Section.classList.add('hidden');
      iqSection.classList.remove('hidden');
      iqInput.value = '';
      iqInput.focus();
    }

    function showIqError() {
      iqSection.classList.add('hidden');
      challenge4Section.classList.add('hidden');
      iqErrorSection.classList.remove('hidden');
    }

    function showChallenge4() {
      iqSection.classList.add('hidden');
      iqErrorSection.classList.add('hidden');
      challenge4Section.classList.remove('hidden');
    }

    function goForward(method) {
      stageText.textContent = '';
      stageText.style.display = 'none';
      redText.textContent = '';
      continueBtn.classList.add('hidden');
      noBtn.classList.add('hidden');
      resultText.classList.remove('hidden');

      if (method === 'no') {
        resultText.textContent = 'ok, ei sitten😒';
      } else {
        resultText.textContent = 'good boy 😏';
      }

      showIqQuestion();
    }

    saveNameBtn.addEventListener('click', () => {
      const name = playerNameInput.value.trim();

      if (!name) {
        playerNameInput.focus();
        playerNameInput.placeholder = 'Kirjoita ensin nimi 😎';
        return;
      }

      showContinueFlow(name);
    });

    playerNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        saveNameBtn.click();
      }
    });

    continueBtn.addEventListener('click', () => {
      continueClicks += 1;

      if (continueClicks === 1) {
        redText.textContent = 'Pahoittelut, varmistaisitko vielä jatketaanko?';
      } else if (continueClicks === 2) {
        redText.textContent = 'Oletko nyt AIVAN varma?';
      } else if (continueClicks >= 3 && continueClicks < 100) {
        redText.textContent = 'Painaisitko nappia vielä 100 kertaa varmistaaksesi, että haluat jatkaa?';
        noBtn.classList.remove('hidden');
      }

      if (continueClicks >= 100) {
        goForward('100');
      }
    });

    noBtn.addEventListener('click', () => {
      goForward('no');
    });

    iqSubmitBtn.addEventListener('click', () => {
      const iqValue = Number(iqInput.value);

      if (iqInput.value.trim() === '') {
        iqInput.focus();
        return;
      }

      if (iqValue > 10) {
        showIqError();
      } else {
        showChallenge4();
      }
    });

    iqInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        iqSubmitBtn.click();
      }
    });

    retryIqBtn.addEventListener('click', () => {
      showIqQuestion();
    });
  </script>
</body>
</html>
