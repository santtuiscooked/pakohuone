<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pakohuone</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffe44d;
  font-family: Arial, Helvetica, sans-serif;
}

.card {
  width: min(92vw, 900px);
  background: #fff;
  border: 5px solid #111;
  border-radius: 28px;
  padding: 30px;
  text-align: center;
}

.title {
  font-size: 3rem;
  font-weight: 900;
  margin-bottom: 20px;
}

.screen {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
}

.hidden { display: none; }

input {
  padding: 12px;
  border-radius: 12px;
  border: 3px solid #111;
  text-align: center;
}

button {
  border: 3px solid #111;
  border-radius: 999px;
  padding: 12px 20px;
  font-weight: bold;
  cursor: pointer;
}

.primary-btn { background: #00e676; }
.secondary-btn { background: #ff87b7; }

.error { color: red; font-weight: bold; }

.image-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 100%;
}

.choice-card {
  border: 3px solid #111;
  border-radius: 16px;
  padding: 10px;
  cursor: pointer;
}

.choice-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}
</style>
</head>

<body>
<main class="card">
<h1 class="title">TERVETULOA</h1>

<!-- NIMI -->
<section id="nameSection" class="screen">
  <input id="playerName" placeholder="Kirjoita nimesi" />
  <button id="startBtn">aloita</button>
</section>

<!-- JATKA -->
<section id="continueSection" class="screen hidden">
  <div id="stageText"></div>
  <button id="continueBtn">Jatka</button>
  <button id="noBtn" class="hidden">En</button>
  <div id="redText"></div>
</section>

<!-- TULOS -->
<section id="resultSection" class="screen hidden">
  <div id="resultText"></div>
  <button id="resultNext">jatka</button>
</section>

<!-- IQ -->
<section id="iqSection" class="screen hidden">
  <div>Mikä on älykkyysosamääräsi?</div>
  <input id="iqInput" type="number" />
  <button id="iqBtn">Vastaa</button>
</section>

<!-- VIRHE -->
<section id="iqError" class="screen hidden">
  <div class="error">laajan tekoälyskannauksen perusteella tämä ei ole valitettavasti mahdollista.</div>
  <button id="retryIq">yritä uudestaan</button>
</section>

<!-- ONNISTUI -->
<section id="success3" class="screen hidden">
  <div>Onnittelut, nyt taisi osua kohdalleen! Jatketaan!</div>
  <button id="toChallenge4">jatka</button>
</section>

<!-- HAASTE 4 -->
<section id="challenge4" class="screen hidden">
  <div>Kuka on paras tyyppi?</div>

  <div class="image-grid">
    <button class="choice" data-correct="false"><img src="Marq.png"></button>
    <button class="choice" data-correct="false"><img src="Santtu.png"></button>
    <button class="choice" data-correct="false"><img src="Niko.png"></button>
    <button class="choice" data-correct="false"><img src="Jessetys.png"></button>
    <button class="choice" data-correct="true"><img src="Helmi.png"></button>
    <button class="choice" data-correct="false"><img src="Ella.png"></button>
  </div>
</section>

<!-- VÄÄRIN -->
<section id="wrong4" class="screen hidden">
  <div class="error">Valitettavasti ei osunut oikeaan... 😥</div>
  <button id="retry4">Yritä uudelleen</button>
</section>

<!-- OIKEIN -->
<section id="correct4" class="screen hidden">
  <div>Lakiteknisistä syistä tämä oli valitettavasti oikea vastaus...</div>
</section>

</main>

<script>
const sections = document.querySelectorAll("section");

function show(id) {
  sections.forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// nimi
document.getElementById("startBtn").onclick = () => {
  const name = document.getElementById("playerName").value;
  document.getElementById("stageText").textContent = `Tervetuloa ${name}!`;
  show("continueSection");
};

let clicks = 0;

document.getElementById("continueBtn").onclick = () => {
  clicks++;
  if (clicks > 2) {
    document.getElementById("noBtn").classList.remove("hidden");
  }
};

document.getElementById("noBtn").onclick = () => {
  document.getElementById("resultText").textContent = "ok, ei sitten😒";
  show("resultSection");
};

document.getElementById("resultNext").onclick = () => show("iqSection");

// IQ
document.getElementById("iqBtn").onclick = () => {
  const val = Number(document.getElementById("iqInput").value);
  if (val > 10) show("iqError");
  else show("success3");
};

document.getElementById("retryIq").onclick = () => show("iqSection");

// siirtymä haaste 4
document.getElementById("toChallenge4").onclick = () => show("challenge4");

// HAASTE 4 klikit
document.querySelectorAll(".choice").forEach(btn => {
  btn.onclick = () => {
    if (btn.dataset.correct === "true") {
      show("correct4");
    } else {
      show("wrong4");
    }
  };
});

// UUSI 🔥 retry nappi
document.getElementById("retry4").onclick = () => {
  show("challenge4");
};
</script>

</body>
</html>
